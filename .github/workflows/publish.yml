name: Publish @command-palette/react

on:
  push:
    tags:
      - "react-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @command-palette/react exec playwright install --with-deps chromium

      - name: Validate release tag
        id: release
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#react-v}"
          package_version="$(node -p "require('./packages/react/package.json').version")"

          if [ "${tag}" = "${version}" ]; then
            echo "Tag ${tag} must start with react-v."
            exit 1
          fi

          if [ "${package_version}" != "${version}" ]; then
            echo "Tag ${tag} does not match package version ${package_version}."
            exit 1
          fi

          if npm view "@command-palette/react@${version}" version >/dev/null 2>&1; then
            echo "@command-palette/react@${version} is already published."
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify
        run: pnpm check

      - name: Publish package
        run: pnpm --filter "@command-palette/react" exec npm publish --access public
