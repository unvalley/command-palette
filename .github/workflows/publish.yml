name: Publish @command-palette/react

on:
  push:
    tags:
      - "react-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. react-v0.0.2)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ env.TAG_NAME }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @command-palette/react exec playwright install --with-deps chromium

      - name: Validate release tag
        id: release
        run: |
          tag="${TAG_NAME}"
          version="${tag#react-v}"
          package_version="$(node -p "require('./packages/react/package.json').version")"

          if [ "${tag}" = "${version}" ]; then
            echo "Tag ${tag} must start with react-v."
            exit 1
          fi

          if [ "${package_version}" != "${version}" ]; then
            echo "Tag ${tag} does not match package version ${package_version}."
            exit 1
          fi

          git fetch --tags --force origin
          tag_sha="$(git rev-list -n 1 "${tag}" 2>/dev/null || true)"
          if [ -z "${tag_sha}" ]; then
            echo "Tag ${tag} does not exist."
            exit 1
          fi

          git fetch origin main
          if ! git merge-base --is-ancestor "${tag_sha}" origin/main; then
            echo "Tag ${tag} points to ${tag_sha}, which is not contained in origin/main."
            exit 1
          fi

          if npm view "@command-palette/react@${version}" version >/dev/null 2>&1; then
            echo "@command-palette/react@${version} is already published."
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify
        run: pnpm check

      - name: Publish package
        working-directory: packages/react
        run: npm publish --provenance --access public
