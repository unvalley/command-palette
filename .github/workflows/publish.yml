name: Publish @command-palette/react

on:
  push:
    tags:
      - "react-v*"
  workflow_run:
    workflows:
      - Create @command-palette/react release tag
    types:
      - completed

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @command-palette/react exec playwright install --with-deps chromium

      - name: Validate release tag
        id: release
        env:
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#react-v}"
          else
            version="$(node -p "require('./packages/react/package.json').version")"
            tag="react-v${version}"
          fi

          package_version="$(node -p "require('./packages/react/package.json').version")"

          if [ "${tag}" = "${version}" ]; then
            echo "Tag ${tag} must start with react-v."
            exit 1
          fi

          if [ "${package_version}" != "${version}" ]; then
            echo "Tag ${tag} does not match package version ${package_version}."
            exit 1
          fi

          git fetch --tags --force origin
          tag_sha="$(git rev-list -n 1 "${tag}" 2>/dev/null || true)"
          if [ -z "${tag_sha}" ]; then
            echo "Tag ${tag} does not exist."
            exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ] && [ "${tag_sha}" != "${WORKFLOW_RUN_HEAD_SHA}" ]; then
            echo "Tag ${tag} points to ${tag_sha}, not workflow head ${WORKFLOW_RUN_HEAD_SHA}."
            exit 1
          fi

          git fetch origin main
          if ! git merge-base --is-ancestor "${tag_sha}" origin/main; then
            echo "Tag ${tag} points to ${tag_sha}, which is not contained in origin/main."
            exit 1
          fi

          if npm view "@command-palette/react@${version}" version >/dev/null 2>&1; then
            echo "@command-palette/react@${version} is already published."
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify
        run: pnpm check

      - name: Publish package
        run: pnpm --filter "@command-palette/react" exec npm publish --access public
